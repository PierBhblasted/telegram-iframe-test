name = "telegram-proxy"
main = "cloudflare-worker.js"
compatibility_date = "2024-01-01"

# Set your custom domain route — must match your Lovable app's domain
# This Worker intercepts ALL requests to your domain and routes accordingly
[[routes]]
pattern = "app.yourdomain.com/*"
zone_name = "yourdomain.com"

[vars]
# Override this with your real Lovable app URL via `wrangler secret put APP_ORIGIN`
APP_ORIGIN = "https://your-app.lovable.app"
